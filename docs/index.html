<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1729" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>JustBreatheBro</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html {
      -webkit-text-size-adjust: 100%;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1729;
      color: #e8eef6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding:
        max(1.5rem, env(safe-area-inset-top))
        max(1.25rem, env(safe-area-inset-right))
        max(1.5rem, env(safe-area-inset-bottom))
        max(1.25rem, env(safe-area-inset-left));
      text-align: center;
      line-height: 1.5;
      -webkit-tap-highlight-color: rgba(56, 189, 248, 0.25);
      touch-action: manipulation;
    }
    .wrap {
      width: 100%;
      max-width: 20rem;
    }
    @media (min-width: 480px) {
      .wrap {
        max-width: 24rem;
      }
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.5rem, 5vw, 1.75rem);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .tag {
      margin: 0 0 1.75rem;
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      color: #94a3b8;
    }
    a.bmc {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 3.25rem;
      touch-action: manipulation;
      padding: 0.75rem 1.25rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      background: rgba(148, 163, 184, 0.15);
      color: #e8eef6;
      border: 1px solid rgba(148, 163, 184, 0.35);
      transition: transform 0.15s ease, background 0.15s ease;
    }
    a.bmc:active {
      transform: scale(0.98);
    }
    a.bmc:focus-visible {
      outline: 2px solid #38bdf8;
      outline-offset: 3px;
    }
    @media (hover: hover) {
      a.bmc:hover {
        background: rgba(148, 163, 184, 0.22);
      }
    }
    .thanks {
      margin: 1.75rem 0 0;
      font-size: clamp(0.85rem, 3vw, 0.9rem);
      color: #94a3b8;
    }
    .thanks + .thanks {
      margin-top: 0.65rem;
    }
    .contact {
      margin: 0.5rem 0 0;
      font-size: clamp(0.85rem, 3vw, 0.9rem);
      color: #94a3b8;
    }
    .contact a {
      color: #38bdf8;
      text-decoration: none;
    }
    .contact a:focus-visible {
      outline: 2px solid #38bdf8;
      outline-offset: 2px;
      border-radius: 2px;
    }
    @media (hover: hover) {
      .contact a:hover {
        text-decoration: underline;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>JustBreatheBro</h1>
    <p class="tag">Breathe Through your nose Homies.</p>

    <a class="bmc" href="https://buymeacoffee.com/michaeldabraham" rel="noopener noreferrer" target="_blank">Buy me a dirty chai with oat milk</a>

    <p class="thanks">
      Optional support. No features or content are unlocked.    - lol Imagine apple taking 30%
    </p>
    <p class="thanks">Thanks for using the app — it means a lot.</p>
    <p class="contact">
      <a href="https://www.linkedin.com/in/michael-dee-abraham" rel="noopener noreferrer" target="_blank">LinkedIn</a>
      <span aria-hidden="true"> · </span>
      <a href="https://github.com/michael-d-abraham" rel="noopener noreferrer" target="_blank">GitHub</a>
    </p>
  </div>
</body>
</html>
